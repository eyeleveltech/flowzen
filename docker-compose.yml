version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: elitepm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: elitepm
      POSTGRES_PASSWORD: elitepm_secret
      POSTGRES_DB: elitepm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elitepm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
