version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: elitepm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elitepm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elitepm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-elitepm}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elitepm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elitepm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: flowzen-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-elitepm}:${POSTGRES_PASSWORD:-elitepm_secret}@postgres:5432/${POSTGRES_DB:-elitepm}?schema=public
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_me_in_prod}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - APIFY_TOKEN=${APIFY_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=4000
      # Set to "true" ONLY to bypass the automatic pre-migration backup (not recommended).
      - SKIP_PREMIGRATION_BACKUP=${SKIP_PREMIGRATION_BACKUP:-false}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Shared with db-backup so pre-migration dumps land in the same backups volume.
      - postgres_backups:/backups
      # Persist generated PDFs (quotes/invoices) across container rebuilds — the
      # uploads dir is gitignored and lives only in the container otherwise.
      - uploads_data:/app/apps/api/uploads
    # Safe boot: take a pre-migration backup, apply reviewed migrations, then start.
    # NOTE: on the FIRST deploy after switching from `db push`, the production DB must
    # already be baselined (see MIGRATIONS.md) or `migrate deploy` will fail on existing tables.
    command: sh ./docker-entrypoint.sh

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    container_name: flowzen-web
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      - api

  db-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: flowzen-db-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-elitepm}
      - POSTGRES_USER=${POSTGRES_USER:-elitepm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-elitepm_secret}
      - POSTGRES_EXTRA_OPTS=-Z9
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=1
      - HEALTHCHECK_PORT=8080
    volumes:
      - postgres_backups:/backups

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  postgres_backups:
    driver: local
  redis_data:
    driver: local
